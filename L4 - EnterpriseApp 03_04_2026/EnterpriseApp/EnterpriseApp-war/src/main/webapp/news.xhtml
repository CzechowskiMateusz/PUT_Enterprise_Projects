<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <title>News</title>
    </h:head>
    <h:body>
        <h:form>
            <h:outputLabel value="Heading: "/>
            <h:inputText id="headingInputText" value="#{newsBean.headingText}" />
            <br/>
            <h:outputLabel value="Body: "/>
            <h:inputText id="bodyInputText" value="#{newsBean.bodyText}" />
            <br/>
            <h:commandButton value="Submit" action="#{newsBean.submitNews()}" />

            <h:dataTable value="#{newsBean.newsItems}" var="item" border="1">
                <h:column>
                    <f:facet name="header">Id</f:facet>
                    #{item.id}
                </h:column>
                <h:column>
                    <f:facet name="header">Heading</f:facet>
                    #{item.heading}
                </h:column>
                <h:column>
                    <f:facet name="header">Body</f:facet>
                    #{item.body}
                </h:column>
            </h:dataTable>
        </h:form>
    </h:body>
</f:view>
</html>
